spring:
    application:
        name: fraud-detection-system
    kafka:
        bootstrap-servers: localhost:9092
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: com.vishavbangotra.fraud_detection_system.serdes.TransactionSerializer
            acks: all
        streams:
            application-id: "fraud-detection-streams"
            properties:
                default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                default.value.serde: com.vishavbangotra.fraud_detection_system.serdes.TransactionSerde
    datasource:
        url: jdbc:postgresql://localhost:5432/fraud
        username: fraud
        password: fraud
    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    data:
        redis:
            host: localhost
            port: 6379

springdoc:
    swagger-ui:
        enabled: true
    api-docs:
        enabled: true

fraud:
    rules:
        amount:
            threshold: 10000
        velocity:
            max: 5
            window-seconds: 60
        ml:
            enabled: false
            url: http://localhost:8090/score
            threshold: 0.75
            weight: 35
            connect-timeout-ms: 250
            read-timeout-ms: 500

alerts:
    webhook:
        url: ${ALERT_WEBHOOK_URL:}
